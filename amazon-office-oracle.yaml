dataset: amazon-office
model: BPR
epochs: 300
train_batch_size: 4096
eval_batch_size: 40960

# ---------------------------------------------------------
# ORACLE CONFIGURATION: 
# No hidden files. Randomly split all clicks 80/10/10.
# The model sees the entire catalog.
# ---------------------------------------------------------
eval_args:
  split: {'RS': [0.8, 0.1, 0.1]} 
  group_by: user
  order: RO
  mode: full

metrics: ['Hit', 'NDCG']
topk: [10]
valid_metric: NDCG@10
metric_decimal_place: 4