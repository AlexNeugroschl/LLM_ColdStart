# configs/base_recbole.yaml

# --- CORE EVALUATION SETTINGS ---
model: LightGCN             
epochs: 300                 
train_batch_size: 8192      
eval_batch_size: 409600     
metrics: ['Hit', 'NDCG']
topk: [10, 20, 50]          # ⬅️ EXPANDED METRICS
valid_metric: NDCG@10
metric_decimal_place: 4

# --- SPEED & EARLY STOPPING (THE FIX) ---
eval_step: 5                
stopping_step: 10           
learning_rate: 0.001        

# --- GRAPH ARCHITECTURE PARAMETERS (LightGCN Specific) ---
embedding_size: 64          
n_layers: 3                 
reg_weight: 1e-04           
require_pow: False